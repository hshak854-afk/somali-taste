    <main>

        <section>
            <h2> Resutaurant Recommendation form</h2>
            <p>Select your preferences to recieive a restaurant reccomendations</p>
        </section>

            <form>

                <p>
                    <label for="diet">Dietary Preference:</label>
                </p>

                <select id="diet" name="diet">
                    <option value="">Select</option>
                    <option value="halal">Halal</option>
                    <option value="vegan">Vegan</option>
                    <option value="none">None</option>
                </select>

                <p>
                    <label for="budget">Budget Range:</label>
                </p>

                <select id="budget" name="budget">
                    <option value="">Select</option>
                    <option value="low">Under $30</option>
                    <option value="medium">$30 - $60</option>
                    <option value="high">$60+</option>
                </select>

                <p>
                    <label for="purpose">Dining Purpose:</label>
                </p>

                <select id="purpose" name="purpose">
                    <option value="">Select</option>
                    <option value="family">Family</option>
                    <option value="date">Date</option>
                    <option value="business">Business</option>
                </select>

                <p>
                    <button type="button">Get Recommendation</button>
                </p>
            </form>
        </section>
